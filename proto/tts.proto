syntax = "proto3";

package parlona.voice.v1;

import "common.proto";

option go_package = "github.com/parlona/cloudapp/pkg/contracts/v1";

// TTS Service for text-to-speech synthesis
service TTSService {
  // Server streaming for text input and audio output
  rpc StreamSynthesize(TTSRequest) returns (stream TTSResponse);

  // Cancel an ongoing synthesis
  rpc Cancel(CancelRequest) returns (CancelResponse);

  // Get provider capabilities
  rpc GetCapabilities(CapabilityRequest) returns (ProviderCapability);
}

// Request for TTS capability (reused from asr.proto)
message CapabilityRequest {
  string provider_name = 1;
}

// TTS request containing text to synthesize
message TTSRequest {
  SessionContext session_context = 1;
  string text = 2;
  string voice_id = 3;
  AudioFormat audio_format = 4;
  int32 segment_index = 5;
  map<string, string> provider_options = 6;
}

// TTS response containing audio chunks
message TTSResponse {
  SessionContext session_context = 1;
  bytes audio_chunk = 2;
  AudioFormat audio_format = 3;
  int32 segment_index = 4;
  bool is_final = 5;
  TimingMetadata timing = 6;
}
