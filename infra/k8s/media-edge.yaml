# CloudApp Media-Edge Service Kubernetes Manifest
# STUB: Deployment and Service for the WebSocket media gateway
# NOTE: This is a template stub. Update image references and resource limits before deploying to production.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-edge
  namespace: voice-engine
  labels:
    app.kubernetes.io/name: media-edge
    app.kubernetes.io/component: websocket-gateway
    app.kubernetes.io/part-of: cloudapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: media-edge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: media-edge
        app.kubernetes.io/component: websocket-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: media-edge
          # TODO: Replace with actual image registry
          image: cloudapp/media-edge:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: CLOUDAPP_SERVER_PORT
              value: "8080"
            - name: CLOUDAPP_SERVER_HOST
              value: "0.0.0.0"
            - name: CLOUDAPP_REDIS_ADDR
              value: "redis:6379"
            - name: CLOUDAPP_POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: cloudapp-secrets
                  key: postgres-dsn
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: media-edge
  namespace: voice-engine
  labels:
    app.kubernetes.io/name: media-edge
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: media-edge
---
