# CloudApp Secrets Template
# STUB: Kubernetes Secret template for sensitive configuration
# WARNING: This file contains PLACEHOLDER values. DO NOT commit real secrets.
# 
# To use:
# 1. Replace placeholder values with actual secrets
# 2. Apply with: kubectl apply -f infra/k8s/secrets.yaml
# 3. Or use external secret management (Vault, Sealed Secrets, etc.)

apiVersion: v1
kind: Secret
metadata:
  name: cloudapp-secrets
  namespace: voice-engine
  labels:
    app.kubernetes.io/name: cloudapp
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # Database credentials
  # Generate with: echo -n 'your-password' | base64
  postgres-user: "voiceengine"
  postgres-password: "CHANGE_ME_IN_PRODUCTION"
  postgres-dsn: "postgres://voiceengine:CHANGE_ME_IN_PRODUCTION@postgres:5432/voiceengine?sslmode=require"

  # Cloud provider API keys
  # Set GROQ_API_KEY environment variable and use:
  # kubectl create secret generic cloudapp-secrets --from-literal=groq-api-key=$GROQ_API_KEY
  groq-api-key: "gsk_CHANGE_ME"

  # Authentication token (if auth enabled)
  auth-token: "CHANGE_ME_SECRET_TOKEN"
---
